previews:
  generation: manual

services:
  - type: web
    name: linebot-golf-parking
    runtime: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: LINE_PAY_CHANNEL_ID
        sync: false
      - key: LINE_PAY_CHANNEL_SECRET
        sync: false
      - key: LINE_PAY_API_URL
        sync: false
      - key: BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: VITE_LIFF_ID
        sync: false
      - key: NODE_ENV
        value: preview
